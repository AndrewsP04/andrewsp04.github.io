<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Visualizer | CodeCraft</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/main.js" defer></script>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>

    <div data-include="components/header.html"></div>

    <main>
        <h2>Module 2: CSS Styling</h2>
        <p>CSS dictates how HTML elements look. Try clicking the buttons below to see how CSS properties change the box
            in real-time.</p>

        <div
            style="display: flex; gap: 30px; align-items: center; margin-top: 20px; padding: 20px; background: #ecf0f1; border-radius: 8px;">

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button id="btn-radius" style="padding: 10px; cursor: pointer;">Toggle Border Radius</button>
                <button id="btn-color" style="padding: 10px; cursor: pointer;">Change Background Color</button>
                <button id="btn-padding" style="padding: 10px; cursor: pointer;">Increase Padding</button>
            </div>

            <div id="demo-box"
                style="width: 150px; height: 150px; background-color: var(--primary-color); color: white; display: flex; justify-content: center; align-items: center; text-align: center; transition: all 0.3s ease;">
                Target Box
            </div>

        </div>
    </main>

    <div data-include="components/footer.html"></div>

</body>

</html>
