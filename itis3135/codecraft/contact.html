<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask the Tutor | CodeCraft</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    </head>
<body>

    <header>
        <h1>CodeCraft Tutor</h1>
        <p>Master the Basics of Web Development</p>
    </header>

<div data-include="components/header.html"></div>

    <main>
        <h2>Ask the Tutor</h2>
        <p>Stuck on a concept? Fill out the form below and I will get back to you with guidance.</p>
        
        <form style="display: flex; flex-direction: column; gap: 15px; max-width: 500px;">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="module">Which module do you need help with?</label>
            <select id="module" name="module">
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="js">JavaScript</option>
            </select>

            <label for="question">Your Question:</label>
            <textarea id="question" name="question" rows="5" required></textarea>

            <button type="submit" style="background-color: var(--accent-color); color: white; padding: 10px; border: none; cursor: pointer;">Submit Request</button>
        </form>
    </main>

        <div data-include="components/footer.html"></div>

<script src="scripts/main.js" defer></script>

</body>
</html>
